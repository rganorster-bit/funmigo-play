<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Funmigo City Rush</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 20% 20%,
          rgba(255, 255, 255, 0.08) 0 2px,
          transparent 3px
        ),
        linear-gradient(135deg, #004aa8, #1575d1);

      background-size: 28px 28px, auto;
      color: #111111;
    }

    .game-card {
      width: 100%;
      max-width: 520px;

      padding: 28px 22px;

      text-align: center;
      background: #fff8e8;

      border: 6px solid #ffffff;
      outline: 5px solid #111111;
      border-radius: 28px;

      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .logo {
      margin-bottom: 6px;

      font-size: clamp(36px, 10vw, 56px);
      font-weight: 1000;
      letter-spacing: -2px;

      color: #ffffff;
      -webkit-text-stroke: 2px #111111;
      text-shadow: 4px 4px 0 #111111;
    }

    .logo span {
      color: #ffc400;
    }

    h1 {
      margin: 12px 0 5px;

      font-size: clamp(32px, 8vw, 48px);
      font-weight: 1000;
      line-height: 1;

      color: #111111;
    }

    .subtitle {
      margin: 8px 0 22px;

      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
    }

    .letter-card {
      width: min(240px, 75%);
      margin: 0 auto 24px;
      padding: 20px 10px;

      background: #ffffff;
      border: 5px solid #111111;
      border-radius: 24px;

      box-shadow: 0 8px 0 #111111;
    }

    .letter-label {
      margin-bottom: 8px;

      font-size: 15px;
      font-weight: 1000;
      text-transform: uppercase;
    }

    .letter {
      font-size: clamp(100px, 30vw, 150px);
      font-weight: 1000;
      line-height: 0.9;

      color: #1575d1;
    }

    button {
      width: 100%;
      margin-bottom: 24px;
      padding: 17px 14px;

      font-size: 21px;
      font-weight: 1000;

      color: #111111;
      background: #ffc400;

      border: 4px solid #111111;
      border-radius: 17px;

      box-shadow: 0 7px 0 #111111;
      cursor: pointer;

      transition:
        transform 0.08s ease,
        box-shadow 0.08s ease;
    }

    button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #111111;
    }

    .categories-title {
      margin: 0 0 13px;

      font-size: 21px;
      font-weight: 1000;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .category {
      min-height: 58px;
      padding: 12px 8px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;

      background: #ffffff;
      border: 3px solid #111111;
      border-radius: 14px;
    }

    .category:last-child {
      grid-column: 1 / -1;
    }

    .instruction {
      margin-top: 22px;
      padding: 14px;

      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;

      color: #ffffff;
      background: #111111;

      border-radius: 15px;
    }

    .instruction strong {
      color: #ffc400;
    }

    .footer {
      margin-top: 18px;

      font-size: 17px;
      font-weight: 1000;
    }

    .footer span {
      color: #1575d1;
    }

    @media (max-width: 420px) {
      .game-card {
        padding: 24px 14px;
      }

      .categories-grid {
        gap: 8px;
      }

      .category {
        min-height: 54px;
        padding: 10px 6px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <main class="game-card">

    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <h1>CITY RUSH</h1>

    <p class="subtitle">
      Find one answer for every category using the selected letter
    </p>

    <section class="letter-card" aria-live="polite">

      <div class="letter-label">
        YOUR LETTER
      </div>

      <div id="randomLetter" class="letter">
        A
      </div>

    </section>

    <button id="newLetterButton" type="button">
      🎲 GET A NEW LETTER
    </button>

    <h2 class="categories-title">
      CATEGORIES
    </h2>

    <section class="categories-grid">

      <div class="category">
        CITY
      </div>

      <div class="category">
        COUNTRY
      </div>

      <div class="category">
        CELEBRITY
      </div>

      <div class="category">
        FOOD
      </div>

      <div class="category">
        ANIMAL
      </div>

      <div class="category">
        PLANT
      </div>

      <div class="category">
        OBJECT
      </div>

      <div class="category">
        MOVIE / TV SHOW
      </div>

      <div class="category">
        SONG / BAND / SINGER
      </div>

    </section>

    <div class="instruction">
      Write one answer for each category.
      Every answer must begin with the
      <strong>selected letter</strong>.
    </div>

    <div class="footer">
      LET’S <span>FUNMIGO!</span>
    </div>

  </main>

  <script>
    /*
      Curated letters only.

      Difficult letters such as Q, X and Z are excluded
      so every round remains playable and enjoyable.
    */

    const playableLetters = [
      "A",
      "B",
      "C",
      "D",
      "E",
      "F",
      "G",
      "H",
      "I",
      "J",
      "K",
      "L",
      "M",
      "N",
      "O",
      "P",
      "R",
      "S",
      "T",
      "U",
      "V",
      "W"
    ];

    const randomLetterElement =
      document.getElementById("randomLetter");

    const newLetterButton =
      document.getElementById("newLetterButton");

    let previousLetter = "";

    function generateRandomLetter() {
      let selectedLetter;

      /*
        Prevent the same letter from appearing
        twice in a row.
      */
      do {
        const randomIndex = Math.floor(
          Math.random() * playableLetters.length
        );

        selectedLetter =
          playableLetters[randomIndex];

      } while (
        selectedLetter === previousLetter &&
        playableLetters.length > 1
      );

      previousLetter = selectedLetter;

      randomLetterElement.textContent =
        selectedLetter;
    }

    newLetterButton.addEventListener(
      "click",
      generateRandomLetter
    );

    /*
      Generate a fresh letter automatically
      whenever the QR page opens.
    */
    generateRandomLetter();
  </script>

</body>
</html>
