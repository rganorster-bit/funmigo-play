<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FUNMIGO Dice</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #1fa64b 0%, #0d6f31 55%, #063d19 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 0 #000;
    }

    .logo span {
      color: #ffc400;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 28px;
    }

    .dice-card {
      background: white;
      border: 6px solid black;
      border-radius: 34px;
      width: min(70vw, 260px);
      aspect-ratio: 1;
      margin: 0 auto 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.35);
    }

    .dice-face {
      font-size: clamp(130px, 38vw, 190px);
      line-height: 1;
      color: #111;
      user-select: none;
    }

    .rolling {
      animation: rollShake 0.12s infinite;
    }

    button {
      width: 100%;
      background: #ffc400;
      color: #111;
      border: 4px solid black;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 black;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
    }

    .hint {
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
      opacity: 0.9;
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.75;
    }

    @keyframes rollShake {
      0% {
        transform: rotate(-6deg) scale(1);
      }

      50% {
        transform: rotate(6deg) scale(1.04);
      }

      100% {
        transform: rotate(-4deg) scale(1);
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <div class="title">🎲 ROLL THE DICE</div>

    <section id="diceCard" class="dice-card">
      <div id="diceFace" class="dice-face">⚀</div>
    </section>

    <button id="rollButton" type="button">
      ROLL THE DICE
    </button>

    <div class="hint">
      Tap the button and let luck decide.
    </div>

    <div class="footer">
      © 2026 FUNMIGO. ALL RIGHTS RESERVED.
    </div>
  </main>

  <script>
    const diceFaces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    const diceCard = document.getElementById("diceCard");
    const diceFace = document.getElementById("diceFace");
    const rollButton = document.getElementById("rollButton");

    let isRolling = false;

    function getRandomFace() {
      const randomIndex = Math.floor(Math.random() * diceFaces.length);
      return diceFaces[randomIndex];
    }

    function rollDice() {
      if (isRolling) {
        return;
      }

      isRolling = true;
      rollButton.disabled = true;
      rollButton.textContent = "ROLLING...";
      diceCard.classList.add("rolling");

      let rolls = 22;

      const rollInterval = setInterval(() => {
        diceFace.textContent = getRandomFace();
        rolls -= 1;

        if (rolls <= 0) {
          clearInterval(rollInterval);

          diceFace.textContent = getRandomFace();
          diceCard.classList.remove("rolling");

          rollButton.disabled = false;
          rollButton.textContent = "ROLL THE DICE";
          isRolling = false;

          navigator.vibrate?.(80);
        }
      }, 50);
    }

    rollButton.addEventListener("click", rollDice);

    diceFace.textContent = getRandomFace();
  </script>
</body>
</html>
