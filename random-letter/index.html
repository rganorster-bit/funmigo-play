<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FUNMIGO - Random Letter</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #2431b8 0%, #101878 50%, #070b35 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 0 #000;
    }

    .logo span {
      color: #ffc400;
    }

    .title {
      font-size: 23px;
      font-weight: 900;
      margin-bottom: 26px;
    }

    .letter-card {
      background: white;
      color: black;
      border: 5px solid black;
      border-radius: 30px;
      min-height: 230px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.35);
      transition: transform 0.12s ease;
    }

    .letter-card.shuffle {
      animation: bounce 0.16s infinite alternate;
    }

    .letter {
      font-size: clamp(120px, 38vw, 180px);
      line-height: 1;
      font-weight: 900;
    }

    button {
      width: 100%;
      background: #ffc400;
      color: #111;
      border: 4px solid black;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 23px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 black;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
    }

    .hint {
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
      opacity: 0.9;
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.75;
    }

    @keyframes bounce {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.035) rotate(1deg);
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <div class="title">🔤 RANDOM LETTER</div>

    <section id="letterCard" class="letter-card">
      <div id="letter" class="letter">A</div>
    </section>

    <button id="newLetterButton" type="button">
      NEW LETTER
    </button>

    <div class="hint">
      Tap the button to draw a new letter.
    </div>

    <div class="footer">
      © 2026 FUNMIGO. ALL RIGHTS RESERVED.
    </div>
  </main>

  <script>
    const letters = [
      "A", "A", "A",
      "B", "B",
      "C", "C",
      "D", "D",
      "E", "E", "E",
      "F",
      "G",
      "H",
      "I", "I",
      "J",
      "K",
      "L",
      "M",
      "N",
      "O", "O",
      "P",
      "Q",
      "R",
      "S",
      "T",
      "U",
      "V",
      "W",
      "X",
      "Y",
      "Z"
    ];

    const letterDisplay = document.getElementById("letter");
    const letterCard = document.getElementById("letterCard");
    const newLetterButton = document.getElementById("newLetterButton");

    let isShuffling = false;

    function getRandomLetter() {
      const randomIndex = Math.floor(Math.random() * letters.length);
      return letters[randomIndex];
    }

    function newLetter() {
      if (isShuffling) {
        return;
      }

      isShuffling = true;
      newLetterButton.disabled = true;
      newLetterButton.textContent = "SHUFFLING...";
      letterCard.classList.add("shuffle");

      let spins = 22;

      const shuffleInterval = setInterval(() => {
        letterDisplay.textContent = getRandomLetter();
        spins -= 1;

        if (spins <= 0) {
          clearInterval(shuffleInterval);

          letterDisplay.textContent = getRandomLetter();
          letterCard.classList.remove("shuffle");

          newLetterButton.disabled = false;
          newLetterButton.textContent = "NEW LETTER";
          isShuffling = false;

          navigator.vibrate?.(80);
        }
      }, 45);
    }

    newLetterButton.addEventListener("click", newLetter);

    letterDisplay.textContent = getRandomLetter();
  </script>
</body>
</html>
