<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FUNMIGO - Mixed Sentences</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #2431b8 0%, #101878 52%, #070b35 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 620px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 0 #000;
    }

    .logo span {
      color: #ffc400;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .sentence-card {
      min-height: 280px;
      background: white;
      color: #111;
      border: 6px solid black;
      border-radius: 32px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 13px 0 rgba(0, 0, 0, 0.35);
    }

    .sentence-card.shuffle {
      animation: bounce 0.14s infinite alternate;
    }

    .label {
      align-self: center;
      background: #ffc400;
      border: 3px solid #111;
      border-radius: 999px;
      padding: 8px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      font-weight: 900;
    }

    .mixed-sentence {
      font-size: clamp(30px, 8vw, 48px);
      line-height: 1.28;
      font-weight: 900;
      letter-spacing: 1px;
      overflow-wrap: anywhere;
    }

    .answer {
      margin-top: 22px;
      padding: 16px;
      background: #ddf8df;
      border: 3px solid #19843b;
      border-radius: 16px;
      color: #12672d;
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.3;
      font-weight: 900;
    }

    .hidden {
      display: none;
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      width: 100%;
      border: 4px solid black;
      border-radius: 18px;
      padding: 17px 20px;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 black;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .answer-button {
      background: #22c55e;
      color: #07120b;
    }

    .new-button {
      background: #ffc400;
      color: #111;
    }

    .rule {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 800;
    }

    .footer {
      margin-top: 27px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.75;
    }

    @keyframes bounce {
      from {
        transform: scale(1) rotate(-1deg);
      }

      to {
        transform: scale(1.025) rotate(1deg);
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <div class="title">🧩 MIXED SENTENCES</div>

    <div class="subtitle">
      Fix the spaces. Discover the sentence!
    </div>

    <section id="sentenceCard" class="sentence-card">
      <div class="label">BROKEN SENTENCE</div>

      <div id="mixedSentence" class="mixed-sentence"></div>

      <div id="answer" class="answer hidden"></div>
    </section>

    <div class="buttons">
      <button id="answerButton" class="answer-button" type="button">
        SHOW ANSWER
      </button>

      <button id="newButton" class="new-button" type="button">
        NEW SENTENCE
      </button>
    </div>

    <div class="rule">
      🏆 First team to say the complete sentence correctly wins!
    </div>

    <div class="footer">
      © 2026 FUNMIGO. ALL RIGHTS RESERVED.
    </div>
  </main>

  <script>
    const sentences = [
      "Today is going to be a great day",
      "This is going to be a fun night",
      "Good things come to those who wait",
      "The best is yet to come",
      "Never give up on your dreams",
      "Practice makes perfect",
      "Actions speak louder than words",
      "Better late than never",
      "Two heads are better than one",
      "Every cloud has a silver lining",
      "Time flies when you are having fun",
      "Home is where the heart is",
      "The early bird catches the worm",
      "Do not judge a book by its cover",
      "A picture is worth a thousand words",
      "There is no place like home",
      "Laughter is the best medicine",
      "You only live once",
      "Keep your eyes on the prize",
      "What goes around comes around",
      "Dream big and work hard",
      "Life is better with good friends",
      "Nothing is impossible",
      "The show must go on",
      "Follow your heart",
      "Make every moment count",
      "Believe in yourself",
      "Happiness starts with you",
      "Together we are stronger",
      "Tomorrow is another day",
      "Always look on the bright side",
      "Sometimes less is more",
      "Success does not happen overnight",
      "Be careful what you wish for",
      "The truth always comes out",
      "Good friends are hard to find",
      "A little kindness goes a long way",
      "You learn something new every day",
      "Do not put all your eggs in one basket",
      "When one door closes another one opens"
    ];

    const mixedSentenceDisplay =
      document.getElementById("mixedSentence");

    const answerDisplay =
      document.getElementById("answer");

    const answerButton =
      document.getElementById("answerButton");

    const newButton =
      document.getElementById("newButton");

    const sentenceCard =
      document.getElementById("sentenceCard");

    let previousIndex = -1;
    let currentSentence = "";
    let isShuffling = false;

    function getRandomSentenceIndex() {
      let index;

      do {
        index = Math.floor(Math.random() * sentences.length);
      } while (
        index === previousIndex &&
        sentences.length > 1
      );

      return index;
    }

    function createMixedSentence(sentence) {
      const cleanText = sentence
        .toUpperCase()
        .replace(/[^A-Z]/g, "");

      const chunks = [];
      let position = 0;

      while (position < cleanText.length) {
        const remaining = cleanText.length - position;

        let chunkLength =
          Math.floor(Math.random() * 4) + 2;

        if (remaining <= 5) {
          chunkLength = remaining;
        }

        chunks.push(
          cleanText.slice(position, position + chunkLength)
        );

        position += chunkLength;
      }

      return chunks.join(" ");
    }

    function displayNewSentence() {
      if (isShuffling) {
        return;
      }

      isShuffling = true;
      newButton.disabled = true;
      answerButton.disabled = true;
      newButton.textContent = "MIXING...";
      sentenceCard.classList.add("shuffle");

      answerDisplay.classList.add("hidden");
      answerButton.textContent = "SHOW ANSWER";

      let spins = 16;

      const interval = setInterval(() => {
        const temporarySentence =
          sentences[
            Math.floor(Math.random() * sentences.length)
          ];

        mixedSentenceDisplay.textContent =
          createMixedSentence(temporarySentence);

        spins -= 1;

        if (spins <= 0) {
          clearInterval(interval);

          const finalIndex = getRandomSentenceIndex();
          previousIndex = finalIndex;
          currentSentence = sentences[finalIndex];

          mixedSentenceDisplay.textContent =
            createMixedSentence(currentSentence);

          answerDisplay.textContent =
            currentSentence.toUpperCase();

          sentenceCard.classList.remove("shuffle");
          newButton.disabled = false;
          answerButton.disabled = false;
          newButton.textContent = "NEW SENTENCE";
          isShuffling = false;

          navigator.vibrate?.(80);
        }
      }, 55);
    }

    function toggleAnswer() {
      const answerIsHidden =
        answerDisplay.classList.contains("hidden");

      if (answerIsHidden) {
        answerDisplay.classList.remove("hidden");
        answerButton.textContent = "HIDE ANSWER";
      } else {
        answerDisplay.classList.add("hidden");
        answerButton.textContent = "SHOW ANSWER";
      }
    }

    answerButton.addEventListener("click", toggleAnswer);
    newButton.addEventListener("click", displayNewSentence);

    displayNewSentence();
  </script>
</body>
</html>
