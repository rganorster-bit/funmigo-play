<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Funmigo Fast Hands Caller</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, Helvetica, sans-serif;
      color: #111;

      background:
        radial-gradient(
          circle at 20% 20%,
          rgba(255, 255, 255, 0.12) 0 2px,
          transparent 3px
        ),
        linear-gradient(135deg, #f4b400, #ffd21c);

      background-size: 28px 28px, auto;
    }

    .game-card {
      width: 100%;
      max-width: 540px;
      padding: 28px 20px;

      text-align: center;
      background: #fff8e8;

      border: 6px solid #fff;
      outline: 5px solid #111;
      border-radius: 28px;

      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .logo {
      margin-bottom: 4px;

      font-size: clamp(36px, 10vw, 56px);
      font-weight: 1000;
      letter-spacing: -2px;

      color: #fff;
      -webkit-text-stroke: 2px #111;
      text-shadow: 4px 4px 0 #111;
    }

    .logo span {
      color: #ffc400;
    }

    h1 {
      margin: 10px 0 4px;

      font-size: clamp(34px, 9vw, 52px);
      font-weight: 1000;
      line-height: 1;

      color: #e31b23;
      text-shadow: 3px 3px 0 #111;
      -webkit-text-stroke: 1px #111;
    }

    .subtitle {
      margin: 10px 0 20px;

      font-size: 17px;
      font-weight: 800;
      line-height: 1.35;
    }

    .status-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;

      margin-bottom: 18px;
    }

    .status-box {
      padding: 12px 8px;

      background: #111;
      color: #fff;

      border-radius: 14px;

      font-size: 14px;
      font-weight: 900;
    }

    .status-box span {
      display: block;
      margin-top: 3px;

      color: #ffc400;
      font-size: 22px;
    }

    .call-display {
      min-height: 210px;
      padding: 22px 10px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: #fff;
      border: 5px solid #111;
      border-radius: 24px;

      box-shadow: 0 8px 0 #111;
    }

    .emoji {
      margin-bottom: 8px;
      font-size: 66px;
      line-height: 1;
    }

    .current-call {
      font-size: clamp(55px, 17vw, 90px);
      font-weight: 1000;
      line-height: 0.95;

      color: #1575d1;
    }

    .ready-text {
      font-size: clamp(30px, 8vw, 45px);
      font-weight: 1000;
      color: #111;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;

      margin-top: 24px;
    }

    button {
      padding: 17px 10px;

      font-size: 20px;
      font-weight: 1000;

      border: 4px solid #111;
      border-radius: 16px;

      box-shadow: 0 7px 0 #111;
      cursor: pointer;

      transition:
        transform 0.08s ease,
        box-shadow 0.08s ease;
    }

    button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #111;
    }

    #startStopButton {
      color: #fff;
      background: #18a84a;
    }

    #resetButton {
      color: #111;
      background: #ffc400;
    }

    .instructions {
      margin-top: 22px;
      padding: 14px;

      color: #fff;
      background: #111;

      border-radius: 15px;

      font-size: 15px;
      font-weight: 750;
      line-height: 1.45;
    }

    .instructions strong {
      color: #ffc400;
    }

    .speed-message {
      display: none;

      margin-top: 18px;
      padding: 12px;

      color: #fff;
      background: #e31b23;

      border: 3px solid #111;
      border-radius: 13px;

      font-size: 20px;
      font-weight: 1000;
    }

    .footer {
      margin-top: 18px;

      font-size: 17px;
      font-weight: 1000;
    }

    .footer span {
      color: #e31b23;
    }

    @media (max-width: 420px) {
      .game-card {
        padding: 24px 14px;
      }

      .call-display {
        min-height: 190px;
      }

      button {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="game-card">

    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <h1>FAST HANDS!</h1>

    <p class="subtitle">
      Listen carefully and touch the body part that is called
    </p>

    <section class="status-row">

      <div class="status-box">
        ELAPSED TIME
        <span id="elapsedTime">00:00</span>
      </div>

      <div class="status-box">
        CURRENT PACE
        <span id="paceDisplay">READY</span>
      </div>

    </section>

    <section class="call-display" aria-live="assertive">

      <div id="emoji" class="emoji">✋</div>

      <div id="currentCall" class="ready-text">
        PRESS START
      </div>

    </section>

    <div id="speedMessage" class="speed-message">
      SPEEDING UP!
    </div>

    <section class="buttons">

      <button id="startStopButton" type="button">
        START CALLS
      </button>

      <button id="resetButton" type="button">
        RESET
      </button>

    </section>

    <div class="instructions">
      Calls begin every <strong>1–1.5 seconds</strong>.<br>
      After 30 seconds, the game automatically gets
      <strong>faster</strong>.
    </div>

    <div class="footer">
      STAY SHARP. LET’S <span>FUNMIGO!</span>
    </div>

  </main>

  <script>
    const calls = [
      {
        word: "THUMB",
        emoji: "👍"
      },
      {
        word: "EAR",
        emoji: "👂"
      },
      {
        word: "NOSE",
        emoji: "👃"
      },
      {
        word: "KNEE",
        emoji: "🦵"
      },
      {
        word: "HEAD",
        emoji: "🧑"
      }
    ];

    const currentCallElement =
      document.getElementById("currentCall");

    const emojiElement =
      document.getElementById("emoji");

    const elapsedTimeElement =
      document.getElementById("elapsedTime");

    const paceDisplayElement =
      document.getElementById("paceDisplay");

    const speedMessageElement =
      document.getElementById("speedMessage");

    const startStopButton =
      document.getElementById("startStopButton");

    const resetButton =
      document.getElementById("resetButton");

    let isRunning = false;
    let startTime = 0;
    let elapsedBeforePause = 0;

    let callTimeout = null;
    let timerInterval = null;

    let previousCallIndex = -1;
    let speedMessageTimeout = null;
    let speedUpAnnounced = false;

    function randomBetween(minimum, maximum) {
      return Math.floor(
        Math.random() * (maximum - minimum + 1)
      ) + minimum;
    }

    function getElapsedMilliseconds() {
      if (!isRunning) {
        return elapsedBeforePause;
      }

      return elapsedBeforePause +
        (performance.now() - startTime);
    }

    function formatElapsedTime(milliseconds) {
      const totalSeconds =
        Math.floor(milliseconds / 1000);

      const minutes =
        Math.floor(totalSeconds / 60);

      const seconds =
        totalSeconds % 60;

      return (
        String(minutes).padStart(2, "0") +
        ":" +
        String(seconds).padStart(2, "0")
      );
    }

    function updateTimerDisplay() {
      const elapsed =
        getElapsedMilliseconds();

      elapsedTimeElement.textContent =
        formatElapsedTime(elapsed);

      const elapsedSeconds =
        elapsed / 1000;

      if (!isRunning) {
        paceDisplayElement.textContent =
          elapsed === 0 ? "READY" : "PAUSED";
      } else if (elapsedSeconds < 30) {
        paceDisplayElement.textContent =
          "NORMAL";
      } else {
        paceDisplayElement.textContent =
          "FAST";

        if (!speedUpAnnounced) {
          announceSpeedUp();
        }
      }
    }

    function announceSpeedUp() {
      speedUpAnnounced = true;

      speedMessageElement.style.display =
        "block";

      speakText("Faster!");

      clearTimeout(speedMessageTimeout);

      speedMessageTimeout = setTimeout(
        function() {
          speedMessageElement.style.display =
            "none";
        },
        2500
      );
    }

    function getRandomCallIndex() {
      let newIndex;

      do {
        newIndex =
          Math.floor(Math.random() * calls.length);
      } while (
        newIndex === previousCallIndex &&
        calls.length > 1
      );

      previousCallIndex = newIndex;

      return newIndex;
    }

    function getNextDelay() {
      const elapsedSeconds =
        getElapsedMilliseconds() / 1000;

      /*
        First 30 seconds:
        1.0–1.5 seconds between calls.

        After 30 seconds:
        0.55–0.9 seconds between calls.
      */

      if (elapsedSeconds < 30) {
        return randomBetween(1000, 1500);
      }

      return randomBetween(550, 900);
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) {
        return;
      }

      window.speechSynthesis.cancel();

      const utterance =
        new SpeechSynthesisUtterance(text);

      utterance.lang = "en-US";
      utterance.volume = 1;
      utterance.rate = 1.05;
      utterance.pitch = 1;

      window.speechSynthesis.speak(utterance);
    }

    function makeNextCall() {
      if (!isRunning) {
        return;
      }

      const callIndex =
        getRandomCallIndex();

      const selectedCall =
        calls[callIndex];

      currentCallElement.className =
        "current-call";

      currentCallElement.textContent =
        selectedCall.word;

      emojiElement.textContent =
        selectedCall.emoji;

      speakText(selectedCall.word);

      const delay =
        getNextDelay();

      callTimeout = setTimeout(
        makeNextCall,
        delay
      );
    }

    function startGame() {
      if (isRunning) {
        return;
      }

      isRunning = true;
      startTime = performance.now();

      startStopButton.textContent =
        "PAUSE";

      startStopButton.style.background =
        "#e31b23";

      updateTimerDisplay();

      timerInterval = setInterval(
        updateTimerDisplay,
        100
      );

      /*
        A short preparation announcement before
        the first instruction.
      */

      speakText("Get ready!");

      currentCallElement.className =
        "ready-text";

      currentCallElement.textContent =
        "GET READY!";

      emojiElement.textContent =
        "⚡";

      callTimeout = setTimeout(
        makeNextCall,
        1200
      );
    }

    function pauseGame() {
      if (!isRunning) {
        return;
      }

      elapsedBeforePause +=
        performance.now() - startTime;

      isRunning = false;

      clearTimeout(callTimeout);
      clearInterval(timerInterval);

      window.speechSynthesis.cancel();

      startStopButton.textContent =
        "CONTINUE";

      startStopButton.style.background =
        "#18a84a";

      paceDisplayElement.textContent =
        "PAUSED";
    }

    function resetGame() {
      isRunning = false;

      clearTimeout(callTimeout);
      clearTimeout(speedMessageTimeout);
      clearInterval(timerInterval);

      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }

      startTime = 0;
      elapsedBeforePause = 0;
      previousCallIndex = -1;
      speedUpAnnounced = false;

      elapsedTimeElement.textContent =
        "00:00";

      paceDisplayElement.textContent =
        "READY";

      speedMessageElement.style.display =
        "none";

      currentCallElement.className =
        "ready-text";

      currentCallElement.textContent =
        "PRESS START";

      emojiElement.textContent =
        "✋";

      startStopButton.textContent =
        "START CALLS";

      startStopButton.style.background =
        "#18a84a";
    }

    startStopButton.addEventListener(
      "click",
      function() {
        if (isRunning) {
          pauseGame();
        } else {
          startGame();
        }
      }
    );

    resetButton.addEventListener(
      "click",
      resetGame
    );

    /*
      Stop the voice if the user leaves the page.
    */

    window.addEventListener(
      "beforeunload",
      function() {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
      }
    );

    resetGame();
  </script>

</body>
</html>
