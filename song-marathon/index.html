<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FUNMIGO - Song Marathon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #e82d32 0%, #a90e19 52%, #520308 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 0 #000;
    }

    .logo span {
      color: #ffc400;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
      text-shadow: 0 3px 0 #000;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .song-card {
      min-height: 285px;
      background: white;
      color: #111;
      border: 6px solid black;
      border-radius: 32px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 13px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 30px;
    }

    .song-card.shuffle {
      animation: bounce 0.14s infinite alternate;
    }

    .label {
      display: inline-block;
      background: #ffc400;
      color: #111;
      border: 3px solid #111;
      border-radius: 999px;
      padding: 8px 16px;
      margin-bottom: 22px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.6px;
    }

    .song-name {
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.08;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .artist-name {
      margin-top: 18px;
      color: #a90e19;
      font-size: clamp(18px, 5vw, 26px);
      line-height: 1.2;
      font-weight: 900;
    }

    button {
      width: 100%;
      background: #ffc400;
      color: #111;
      border: 4px solid black;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 23px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 black;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
    }

    .rule {
      margin-top: 18px;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 900;
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.8;
    }

    @keyframes bounce {
      from {
        transform: scale(1) rotate(-1deg);
      }

      to {
        transform: scale(1.03) rotate(1deg);
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <div class="title">🎵 SONG MARATHON</div>

    <div class="subtitle">
      Fill your mouth with water and hum the song!
    </div>

    <section id="songCard" class="song-card">
      <div class="label">YOUR SECRET SONG</div>

      <div id="songName" class="song-name">
        BILLIE JEAN
      </div>

      <div id="artistName" class="artist-name">
        MICHAEL JACKSON
      </div>
    </section>

    <button id="newSongButton" type="button">
      GET A SONG
    </button>

    <div class="rule">
      💧 No words. No singing. Hum only!
    </div>

    <div class="footer">
      © 2026 FUNMIGO. ALL RIGHTS RESERVED.
    </div>
  </main>

  <script>
    const songs = [

      { title: "Stayin' Alive", artist: "Bee Gees" },

      { title: "I Want It That Way", artist: "Backstreet Boys" },
      { title: "Everybody", artist: "Backstreet Boys" },
      { title: "Baby One More Time", artist: "Britney Spears" },

      { title: "Genie in a Bottle", artist: "Christina Aguilera" },
      { title: "Bye Bye Bye", artist: "NSYNC" },
      { title: "Wannabe", artist: "Spice Girls" },
      { title: "Man! I Feel Like a Woman", artist: "Shania Twain" },
      { title: "Livin' on a Prayer", artist: "Bon Jovi" },
      { title: "You Give Love a Bad Name", artist: "Bon Jovi" },

      { title: "Don't Stop Believin'", artist: "Journey" },
      { title: "Sweet Child O' Mine", artist: "Guns N' Roses" },
      { title: "We Will Rock You", artist: "Queen" },
      { title: "We Are the Champions", artist: "Queen" },
      { title: "Another One Bites the Dust", artist: "Queen" },
      { title: "Eye of the Tiger", artist: "Survivor" },
      { title: "Take on Me", artist: "a-ha" },
      { title: "Wake Me Up Before You Go-Go", artist: "Wham!" },
      { title: "Footloose", artist: "Kenny Loggins" },
      { title: "Walking on Sunshine", artist: "Katrina and the Waves" },

      { title: "Uptown Funk", artist: "Mark Ronson ft. Bruno Mars" },
      { title: "Just the Way You Are", artist: "Bruno Mars" },
      { title: "Locked Out of Heaven", artist: "Bruno Mars" },
      { title: "Happy", artist: "Pharrell Williams" },
      { title: "Can't Stop the Feeling", artist: "Justin Timberlake" },
      { title: "Shape of You", artist: "Ed Sheeran" },
      { title: "Perfect", artist: "Ed Sheeran" },
      { title: "Rolling in the Deep", artist: "Adele" },
      { title: "Someone Like You", artist: "Adele" },
      { title: "Shake It Off", artist: "Taylor Swift" },

      { title: "Love Story", artist: "Taylor Swift" },
      { title: "Blank Space", artist: "Taylor Swift" },
      { title: "Firework", artist: "Katy Perry" },
      { title: "Roar", artist: "Katy Perry" },
      { title: "California Gurls", artist: "Katy Perry" },
      { title: "Poker Face", artist: "Lady Gaga" },
      { title: "Bad Romance", artist: "Lady Gaga" },
      { title: "Born This Way", artist: "Lady Gaga" },
      { title: "Umbrella", artist: "Rihanna" },
      { title: "Diamonds", artist: "Rihanna" },

      { title: "Single Ladies", artist: "Beyoncé" },
      { title: "Crazy in Love", artist: "Beyoncé" },
      { title: "Halo", artist: "Beyoncé" },
      { title: "Party in the U.S.A.", artist: "Miley Cyrus" },

      { title: "Viva la Vida", artist: "Coldplay" },
      { title: "Yellow", artist: "Coldplay" },
      { title: "Radioactive", artist: "Imagine Dragons" },
      { title: "Believer", artist: "Imagine Dragons" },

      { title: "Old Town Road", artist: "Lil Nas X" },
      { title: "Blinding Lights", artist: "The Weeknd" },
      { title: "Can't Feel My Face", artist: "The Weeknd" },

      { title: "Don't Start Now", artist: "Dua Lipa" },

      { title: "Since U Been Gone", artist: "Kelly Clarkson" },
      { title: "Complicated", artist: "Avril Lavigne" },
      { title: "Sk8er Boi", artist: "Avril Lavigne" },
      { title: "I'm Yours", artist: "Jason Mraz" },
      { title: "Hey, Soul Sister", artist: "Train" },
      { title: "All Star", artist: "Smash Mouth" },

      { title: "Sweet Caroline", artist: "Neil Diamond" },
      { title: "Build Me Up Buttercup", artist: "The Foundations" },
      { title: "Twist and Shout", artist: "The Beatles" },
      { title: "Hey Jude", artist: "The Beatles" },
      { title: "Let It Be", artist: "The Beatles" },
      { title: "Can't Help Falling in Love", artist: "Elvis Presley" },
      { title: "Jailhouse Rock", artist: "Elvis Presley" },
      { title: "Respect", artist: "Aretha Franklin" },
      { title: "I Got You", artist: "James Brown" },
      { title: "September", artist: "Earth, Wind & Fire" }
    ];

    const songCard = document.getElementById("songCard");
    const songName = document.getElementById("songName");
    const artistName = document.getElementById("artistName");
    const newSongButton = document.getElementById("newSongButton");

    let previousSongIndex = -1;
    let isShuffling = false;

    function getRandomSongIndex() {
      let selectedIndex;

      do {
        selectedIndex = Math.floor(Math.random() * songs.length);
      } while (
        selectedIndex === previousSongIndex &&
        songs.length > 1
      );

      return selectedIndex;
    }

    function displaySong(index) {
      songName.textContent = songs[index].title;
      artistName.textContent = songs[index].artist;
    }

    function showNewSong() {
      if (isShuffling) {
        return;
      }

      isShuffling = true;
      newSongButton.disabled = true;
      newSongButton.textContent = "CHOOSING...";
      songCard.classList.add("shuffle");

      let spins = 22;

      const shuffleInterval = setInterval(() => {
        const temporaryIndex =
          Math.floor(Math.random() * songs.length);

        displaySong(temporaryIndex);
        spins -= 1;

        if (spins <= 0) {
          clearInterval(shuffleInterval);

          const finalIndex = getRandomSongIndex();
          previousSongIndex = finalIndex;
          displaySong(finalIndex);

          songCard.classList.remove("shuffle");
          newSongButton.disabled = false;
          newSongButton.textContent = "NEW SONG";
          isShuffling = false;

          navigator.vibrate?.(80);
        }
      }, 55);
    }

    newSongButton.addEventListener("click", showNewSong);

    const firstSongIndex = getRandomSongIndex();
    previousSongIndex = firstSongIndex;
    displaySong(firstSongIndex);
  </script>
</body>
</html>
