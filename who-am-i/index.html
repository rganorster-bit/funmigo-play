<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FUNMIGO - Who Am I?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #ffc928 0%, #f49b12 52%, #c94a09 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 0 #000;
    }

    .logo span {
      color: #e51e2a;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
      text-shadow: 0 3px 0 #000;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 24px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }

    .name-card {
      min-height: 270px;
      background: white;
      color: #111;
      border: 6px solid black;
      border-radius: 32px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 13px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 30px;
    }

    .name-card.shuffle {
      animation: bounce 0.14s infinite alternate;
    }

    .category {
      display: inline-block;
      background: #ffc400;
      color: #111;
      border: 3px solid #111;
      border-radius: 999px;
      padding: 8px 16px;
      margin-bottom: 22px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.6px;
    }

    .celebrity-name {
      font-size: clamp(40px, 12vw, 66px);
      line-height: 1.05;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    button {
      width: 100%;
      background: #e51e2a;
      color: white;
      border: 4px solid black;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 23px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 black;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
    }

    .hint {
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 800;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.85;
    }

    @keyframes bounce {
      from {
        transform: scale(1) rotate(-1deg);
      }

      to {
        transform: scale(1.035) rotate(1deg);
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">
      FUN<span>MIGO</span>
    </div>

    <div class="title">⭐ WHO AM I?</div>

    <div class="subtitle">
      Describe the celebrity without saying their name!
    </div>

    <section id="nameCard" class="name-card">
      <div id="category" class="category">MUSIC</div>
      <div id="celebrityName" class="celebrity-name">
        MICHAEL JACKSON
      </div>
    </section>

    <button id="newNameButton" type="button">
      GET A CELEBRITY
    </button>

    <div class="hint">
      No names, initials, rhymes, or direct clues.
    </div>

    <div class="footer">
      © 2026 FUNMIGO. ALL RIGHTS RESERVED.
    </div>
  </main>

      { name: "Arnold Schwarzenegger", category: "MOVIES & PUBLIC LIFE" },

      { name: "Steve Carell", category: "MOVIES & TV" },
      { name: "Kevin Hart", category: "COMEDY & MOVIES" },
      { name: "Chris Rock", category: "COMEDY & MOVIES" },
      { name: "Jerry Seinfeld", category: "COMEDY & TV" },
      { name: "Steven Spielberg", category: "MOVIES" },
      { name: "Stan Lee", category: "COMICS & MOVIES" },
      { name: "Stephen King", category: "BOOKS" },
      { name: "J.K. Rowling", category: "BOOKS" }
    ];

    const nameCard = document.getElementById("nameCard");
    const celebrityName = document.getElementById("celebrityName");
    const categoryDisplay = document.getElementById("category");
    const newNameButton = document.getElementById("newNameButton");

    let isShuffling = false;
    let previousIndex = -1;

    function getRandomIndex() {
      let selectedIndex;

      do {
        selectedIndex = Math.floor(Math.random() * celebrities.length);
      } while (
        selectedIndex === previousIndex &&
        celebrities.length > 1
      );

      return selectedIndex;
    }

    function displayCelebrity(index) {
      celebrityName.textContent = celebrities[index].name;
      categoryDisplay.textContent = celebrities[index].category;
    }

    function showNewCelebrity() {
      if (isShuffling) {
        return;
      }

      isShuffling = true;
      newNameButton.disabled = true;
      newNameButton.textContent = "CHOOSING...";
      nameCard.classList.add("shuffle");

      let spins = 22;

      const shuffleInterval = setInterval(() => {
        const temporaryIndex =
          Math.floor(Math.random() * celebrities.length);

        displayCelebrity(temporaryIndex);
        spins -= 1;

        if (spins <= 0) {
          clearInterval(shuffleInterval);

          const finalIndex = getRandomIndex();
          previousIndex = finalIndex;
          displayCelebrity(finalIndex);

          nameCard.classList.remove("shuffle");
          newNameButton.disabled = false;
          newNameButton.textContent = "NEW CELEBRITY";
          isShuffling = false;

          navigator.vibrate?.(80);
        }
      }, 55);
    }

    newNameButton.addEventListener(
      "click",
      showNewCelebrity
    );

    const firstIndex = getRandomIndex();
    previousIndex = firstIndex;
    displayCelebrity(firstIndex);
  </script>
</body>
</html>
